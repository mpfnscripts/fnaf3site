<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Nights at Freddy's 3</title>
    <link rel="icon" href="favicon.ico" />
    <style>
        html { display: block; -webkit-user-select: none; user-select: none; overflow: hidden; height: 100%; }
        body { position: relative; background-color: black; display: flex; align-items: center; justify-content: center; margin: 0; height: 100%; color: white; font-family: monospace; }
        canvas { display: none; user-select: none; }
        .loader { position: absolute; display: flex; flex-direction: column; align-items: center; z-index: 1; text-align: center; width: 85vw; }
        .loader h1 { margin: 0; font-size: 5vw; }
        #bar { margin: 10px 0; border: white solid 1px; width: 0%; transition: width 0.2s; height: 2px; }
        #stage { font-size: 1.4vw; color: #aaa; }
    </style>
</head>
<body>
    <canvas id="MMFCanvas" width="1024" height="768"></canvas>
    <div class="loader" id="loader-ui">
        <h1 id="percentage">0%</h1>
        <div id="bar"></div>
        <h2 id="stage">INITIALIZING...</h2>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        const totalParts = 20;
        const map = new Map();

        // Intercept Images immediately
        const OriginalImage = window.Image;
        window.Image = function() {
            const img = new OriginalImage();
            Object.defineProperty(img, 'src', {
                set(url) {
                    const name = url.toString().split('/').pop();
                    if (map.has(name)) this.setAttribute('src', map.get(name));
                    else this.setAttribute('src', url);
                },
                get() { return this.getAttribute('src'); }
            });
            return img;
        };

        function updateProgress(text, percent) {
            document.getElementById('percentage').innerText = percent + '%';
            document.getElementById('bar').style.width = percent + '%';
            document.getElementById('stage').innerText = text.toUpperCase();
        }

        async function start() {
            try {
                let chunks = [];

                // 1. Download Parts
                for (let i = 1; i <= totalParts; i++) {
                    updateProgress(`FETCHING DATA (PART ${i})...`, Math.floor((i / totalParts) * 40));
                    const response = await fetch(`resources.zip.part${i}`);
                    if (!response.ok) throw new Error(`Missing Part ${i}`);
                    chunks.push(await response.arrayBuffer());
                }

                // 2. Unpack with Uint8Array
                updateProgress("UNPACKING ASSETS...", 50);
                const zip = await JSZip.loadAsync(new Blob(chunks));
                const files = Object.keys(zip.files);
                
                for (let i = 0; i < files.length; i++) {
                    const file = zip.files[files[i]];
                    if (!file.dir) {
                        const fileName = files[i].split('/').pop();
                        const data = await file.async("uint8array");
                        const blob = new Blob([data], { type: "application/octet-stream" });
                        map.set(fileName, URL.createObjectURL(blob));
                    }
                    updateProgress("PREPARING MEMORY...", 50 + Math.floor((i / files.length) * 45));
                }

                // 3. XHR Interceptor
                const originalOpen = XMLHttpRequest.prototype.open;
                XMLHttpRequest.prototype.open = function(method, url) {
                    const name = url.toString().split('/').pop();
                    if (map.has(name)) {
                        url = map.get(name);
                    }
                    return originalOpen.apply(this, [method, url]);
                };

                // 4. Final Launch
                updateProgress("LAUNCHING...", 100);
                const script = document.createElement('script');
                script.src = 'Runtime.js';
                script.onload = () => {
                    document.getElementById('loader-ui').style.display = 'none';
                    document.getElementById('MMFCanvas').style.display = 'block';
                    
                    window.resourcesPath = ""; 
                    
                    const cchFile = Array.from(map.keys()).find(f => f.toLowerCase().endsWith('.cch'));
                    if (!cchFile) throw new Error("Game data (.cch) not found in ZIP!");
                    
                    // --- AUDIO PATCH START ---
                    const resumeAudio = () => {
                        const AC = window.AudioContext || window.webkitAudioContext;
                        if (AC) {
                            const dummy = new AC();
                            if (dummy.state === 'suspended') dummy.resume();
                        }
                        // Clickteam specific audio resume
                        if (window.activeAudioContext) window.activeAudioContext.resume();
                        
                        window.removeEventListener('click', resumeAudio);
                        window.removeEventListener('keydown', resumeAudio);
                    };
                    window.addEventListener('click', resumeAudio);
                    window.addEventListener('keydown', resumeAudio);
                    // --- AUDIO PATCH END ---

                    new Runtime("MMFCanvas", cchFile);
                };
                document.head.appendChild(script);

            } catch (err) {
                document.getElementById('stage').innerHTML = `<span style="color:red">ERROR: ${err.message}</span>`;
                console.error(err);
            }
        }

        window.onload = start;
    </script>
</body>
</html>
