<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Nights at Freddy's 3</title>
    <link rel="icon" href="favicon.ico" />
    <style>
        html { display: block; -webkit-user-select: none; user-select: none; overflow: hidden; height: 100%; }
        body { position: relative; background-color: black; display: flex; align-items: center; justify-content: center; margin: 0; height: 100%; color: white; font-family: monospace; }
        canvas { display: none; user-select: none; }
        .loader { position: absolute; display: flex; flex-direction: column; align-items: center; z-index: 1; text-align: center; width: 85vw; }
        .loader h1 { margin: 0; font-size: 5vw; }
        #bar-container { margin: 10px 0; border: white solid 1px; width: 300px; height: 12px; background: #111; }
        #bar-fill { background: white; width: 0%; height: 100%; transition: width 0.1s; }
        #stage { font-size: 1.4vw; color: #aaa; text-transform: uppercase; }
    </style>
</head>
<body>
    <canvas id="MMFCanvas" width="1024" height="768"></canvas>
    <div class="loader" id="loader-ui">
        <h1 id="percentage">0%</h1>
        <div id="bar-container"><div id="bar-fill"></div></div>
        <h2 id="stage">Initializing...</h2>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        const totalParts = 20;
        const assetMap = new Map();

        // 1. IMAGE INTERCEPTOR: Use Base64 to prevent ERR_FILE_NOT_FOUND on textures
        const OriginalImage = window.Image;
        window.Image = function() {
            const img = new OriginalImage();
            Object.defineProperty(img, 'src', {
                set(url) {
                    const name = url.toString().split('/').pop();
                    if (assetMap.has(name)) {
                        this.setAttribute('src', assetMap.get(name));
                    } else {
                        this.setAttribute('src', url);
                    }
                },
                get() { return this.getAttribute('src'); }
            });
            return img;
        };

        function updateProgress(text, percent) {
            document.getElementById('percentage').innerText = percent + '%';
            document.getElementById('bar-fill').style.width = percent + '%';
            document.getElementById('stage').innerText = text;
        }

        async function start() {
            try {
                let chunks = [];
                for (let i = 1; i <= totalParts; i++) {
                    updateProgress(`Fetching Part ${i}...`, Math.floor((i / totalParts) * 40));
                    const response = await fetch(`resources.zip.part${i}`);
                    if (!response.ok) throw new Error(`Missing part ${i}`);
                    chunks.push(await response.arrayBuffer());
                }

                updateProgress("Unpacking Assets...", 45);
                const zip = await JSZip.loadAsync(new Blob(chunks));
                const files = Object.keys(zip.files);
                
                for (let i = 0; i < files.length; i++) {
                    const file = zip.files[files[i]];
                    if (!file.dir) {
                        const fileName = files[i].split('/').pop();
                        
                        if (/\.(png|jpg|jpeg)$/i.test(fileName)) {
                            // Convert textures to Base64 (cannot expire)
                            const b64 = await file.async("base64");
                            assetMap.set(fileName, `data:image/png;base64,${b64}`);
                        } else {
                            // Store everything else as an ArrayBuffer for direct injection
                            const buffer = await file.async("arraybuffer");
                            assetMap.set(fileName, buffer);
                        }
                    }
                    updateProgress("Memory Mapping...", 50 + Math.floor((i / files.length) * 45));
                }

                // 2. AGGRESSIVE XHR PATCH: Injects data directly without using Blob URLs
                const originalOpen = XMLHttpRequest.prototype.open;
                const originalSend = XMLHttpRequest.prototype.send;

                XMLHttpRequest.prototype.open = function(method, url) {
                    this._url = url.toString().split('/').pop();
                    return originalOpen.apply(this, arguments);
                };

                XMLHttpRequest.prototype.send = function() {
                    if (assetMap.has(this._url)) {
                        const data = assetMap.get(this._url);
                        // If it's the game data, mock a successful response
                        Object.defineProperty(this, 'status', { value: 200 });
                        Object.defineProperty(this, 'readyState', { value: 4 });
                        Object.defineProperty(this, 'response', { value: data });
                        Object.defineProperty(this, 'responseText', { value: new TextDecoder().decode(data) });
                        
                        if (this.onload) this.onload();
                        if (this.onreadystatechange) this.onreadystatechange();
                        return; // Prevent real network request
                    }
                    return originalSend.apply(this, arguments);
                };

                // 3. LAUNCH ENGINE
                updateProgress("Launching...", 100);
                const script = document.createElement('script');
                script.src = 'Runtime.js';
                script.onload = () => {
                    document.getElementById('loader-ui').style.display = 'none';
                    document.getElementById('MMFCanvas').style.display = 'block';
                    
                    window.resourcesPath = ""; 
                    const cchKey = Array.from(assetMap.keys()).find(k => k.toLowerCase().endsWith('.cch'));
                    
                    if (cchKey) {
                        // Start with the filename; the XHR patch will catch the request
                        new Runtime("MMFCanvas", cchKey);
                    }
                };
                document.head.appendChild(script);

            } catch (err) {
                document.getElementById('stage').innerHTML = `<span style="color:red">ERROR: ${err.message}</span>`;
                console.error(err);
            }
        }

        window.onload = start;
    </script>
</body>
</html>
