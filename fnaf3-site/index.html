<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Nights at Freddy's 3</title>
    <link rel="icon" href="favicon.ico" />
    <style>
        html { display: block; -webkit-user-select: none; user-select: none; overflow: hidden; height: 100%; }
        body { position: relative; background-color: black; display: flex; align-items: center; justify-content: center; margin: 0; height: 100%; color: white; font-family: monospace; }
        canvas { display: none; user-select: none; }
        .loader { position: absolute; display: flex; flex-direction: column; align-items: center; z-index: 1; text-align: center; width: 85vw; }
        .loader h1 { margin: 0; font-size: 5vw; }
        #bar { margin: 10px 0; border: white solid 1px; width: 0%; transition: width 0.2s; background-color: #333; }
        #progress-fill { height: 100%; width: 0%; background-color: white; transition: width 0.2s; }
        #stage { font-size: 1.4vw; color: #aaa; }
    </style>
</head>
<body>
    <canvas id="MMFCanvas" width="1024" height="768"></canvas>
    <div class="loader" id="loader-ui">
        <h1 id="percentage">0%</h1>
        <div id="bar" style="height: 10px;"><div id="progress-fill"></div></div>
        <h2 id="stage">INITIALIZING...</h2>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        const totalParts = 20;
        const map = new Map();

        function updateProgress(text, percent) {
            document.getElementById('percentage').innerText = percent + '%';
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('stage').innerText = text.toUpperCase();
        }

        async function start() {
            try {
                let chunks = [];

                // 1. Fetch the 20 parts
                for (let i = 1; i <= totalParts; i++) {
                    updateProgress(`FETCHING DATA (PART ${i})...`, Math.floor((i / totalParts) * 50));
                    const response = await fetch(`resources.zip.part${i}`);
                    if (!response.ok) throw new Error(`Missing resources.zip.part${i}`);
                    chunks.push(await response.arrayBuffer());
                }

                // 2. Combine and Unzip
                updateProgress("OPENING SUITCASE...", 60);
                const blob = new Blob(chunks);
                const zip = await JSZip.loadAsync(await blob.arrayBuffer());
                
                // 3. Map out the files hidden inside the zip
                const files = Object.keys(zip.files);
                let gameBrainBlobURL = null;

                for (let i = 0; i < files.length; i++) {
                    const file = zip.files[files[i]];
                    if (!file.dir) {
                        const content = await file.async("blob");
                        const url = URL.createObjectURL(content);
                        const fileName = files[i].split('/').pop();
                        
                        // If we find the "brain" file inside the zip, save it
                        if (fileName.toLowerCase().endsWith(".cch")) {
                            gameBrainBlobURL = url;
                        }
                        
                        map.set(fileName, url);
                    }
                    updateProgress("PREPARING ASSETS...", 60 + Math.floor((i / files.length) * 35));
                }

                // 4. Intercept network requests
                const ogFetch = window.fetch;
                window.fetch = async (url) => {
                    const name = url.toString().split('/').pop();
                    if (map.has(name)) return new Response(await (await fetch(map.get(name))).blob());
                    return ogFetch(url);
                };

                // 5. Fire up the game
                updateProgress("STARTING...", 100);
                const script = document.createElement('script');
                script.src = 'Runtime.js';
                script.onload = () => {
                    document.getElementById('loader-ui').style.display = 'none';
                    document.getElementById('MMFCanvas').style.display = 'block';
                    window.resourcesPath = ""; 
                    
                    if (!gameBrainBlobURL) {
                        // If it's STILL black, the .cch file is missing from the ZIP too
                        alert("Error: Game data not found inside ZIP parts.");
                        return;
                    }

                    new Runtime("MMFCanvas", gameBrainBlobURL); 
                };
                document.head.appendChild(script);

            } catch (err) {
                document.getElementById('stage').innerHTML = `<span style="color:red">ERROR: ${err.message}</span>`;
            }
        }

        window.onload = start;
    </script>
</body>
</html>
