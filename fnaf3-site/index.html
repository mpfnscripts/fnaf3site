<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNAF 3</title>
    <style>
        body { background: #000; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: monospace; }
        canvas { display: none; }
        .loader { text-align: center; }
        #bar-bg { width: 300px; height: 10px; border: 1px solid #fff; margin: 10px auto; }
        #bar-fill { width: 0%; height: 100%; background: #fff; transition: width 0.1s; }
    </style>
</head>
<body>
    <canvas id="MMFCanvas" width="1024" height="768"></canvas>
    <div class="loader" id="ui">
        <h1 id="pct">0%</h1>
        <div id="bar-bg"><div id="bar-fill"></div></div>
        <p id="msg">INITIALIZING...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        const map = new Map();

        async function run() {
            try {
                let chunks = [];
                // 1. Fetch parts
                for (let i = 1; i <= 20; i++) {
                    const res = await fetch(`resources.zip.part${i}`);
                    if (!res.ok) throw new Error("Missing part " + i);
                    chunks.push(await res.arrayBuffer());
                    let p = Math.floor((i / 20) * 50);
                    document.getElementById('pct').innerText = p + "%";
                    document.getElementById('bar-fill').style.width = p + "%";
                }

                // 2. Unzip
                document.getElementById('msg').innerText = "EXTRACTING ARCHIVE...";
                const zip = await JSZip.loadAsync(new Blob(chunks));
                
                for (let name in zip.files) {
                    const file = zip.files[name];
                    if (!file.dir) {
                        const blob = await file.async("blob");
                        map.set(name.split('/').pop(), URL.createObjectURL(blob));
                    }
                }

                // 3. PATCH XMLHttpRequest (For Runtime.js)
                const originalOpen = XMLHttpRequest.prototype.open;
                XMLHttpRequest.prototype.open = function(method, url) {
                    const fileName = url.toString().split('/').pop();
                    if (map.has(fileName)) {
                        // Redirect the request to our local blob URL
                        url = map.get(fileName);
                    }
                    return originalOpen.apply(this, [method, url]);
                };

                // 4. PATCH fetch (For modern parts)
                const originalFetch = window.fetch;
                window.fetch = async (url) => {
                    const fileName = url.toString().split('/').pop();
                    if (map.has(fileName)) {
                        return originalFetch(map.get(fileName));
                    }
                    return originalFetch(url);
                };

                // 5. Start engine
                const s = document.createElement('script');
                s.src = 'Runtime.js';
                s.onload = () => {
                    document.getElementById('ui').style.display = 'none';
                    document.getElementById('MMFCanvas').style.display = 'block';
                    
                    window.resourcesPath = ""; 
                    const brain = Array.from(map.keys()).find(k => k.endsWith('.cch'));
                    
                    if (!brain) {
                        document.getElementById('msg').innerText = "FATAL: DATA FILE NOT FOUND IN ZIP";
                        return;
                    }

                    new Runtime("MMFCanvas", brain);
                };
                document.head.appendChild(s);

            } catch (e) {
                document.getElementById('msg').innerText = "ERROR: " + e.message;
                console.error(e);
            }
        }
        window.onload = run;
    </script>
</body>
</html>
