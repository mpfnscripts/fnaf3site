<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Nights at Freddy's 3</title>
    <link rel="icon" href="favicon.ico" />
    <style>
        html { display: block; -webkit-user-select: none; user-select: none; overflow: hidden; height: 100%; }
        body { position: relative; background-color: black; display: flex; align-items: center; justify-content: center; margin: 0; height: 100%; color: white; font-family: monospace; }
        canvas { display: none; user-select: none; }
        .loader { position: absolute; display: flex; flex-direction: column; align-items: center; z-index: 1; text-align: center; width: 85vw; }
        .loader h1 { margin: 0; font-size: 5vw; }
        #bar { margin: 10px 0; border: white solid 1px; width: 0%; transition: width 0.2s; }
        #stage { font-size: 1.4vw; color: #aaa; }
    </style>
</head>
<body>
    <canvas id="MMFCanvas" width="1024" height="768"></canvas>
    <div class="loader" id="loader-ui">
        <h1 id="percentage">0%</h1>
        <hr id="bar">
        <h2 id="stage">INITIALIZING...</h2>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        const totalParts = 20;
        const map = new Map();

        function updateProgress(text, percent) {
            document.getElementById('percentage').innerText = percent + '%';
            document.getElementById('bar').style.width = percent + '%';
            document.getElementById('stage').innerText = text.toUpperCase();
        }

        async function start() {
            try {
                let chunks = [];
                let loadedBytes = 0;

                // 1. DOWNLOAD ALL PARTS
                for (let i = 1; i <= totalParts; i++) {
                    updateProgress(`FETCHING DATA (PART ${i})...`, Math.floor((i / totalParts) * 50));
                    const response = await fetch(`resources.zip.part${i}`);
                    if (!response.ok) throw new Error(`Missing resources.zip.part${i}`);
                    const buffer = await response.arrayBuffer();
                    chunks.push(buffer);
                }

                // 2. MERGE PARTS
                updateProgress("STITCHING ARCHIVE...", 55);
                const blob = new Blob(chunks);
                const fullBuffer = await blob.arrayBuffer();

                // 3. EXTRACT FILES
                updateProgress("UNPACKING ASSETS...", 70);
                const zip = await JSZip.loadAsync(fullBuffer);
                const files = Object.keys(zip.files);
                
                for (let i = 0; i < files.length; i++) {
                    const file = zip.files[files[i]];
                    if (!file.dir) {
                        const content = await file.async("blob");
                        map.set(files[i], URL.createObjectURL(content));
                    }
                    updateProgress("BOOTING ARCHIVE...", 70 + Math.floor((i / files.length) * 30));
                }

                // 4. INTERCEPT LOADING
                const ogFetch = window.fetch;
                window.fetch = async (url) => {
                    const name = url.toString().split('/').pop();
                    if (map.has(name)) return new Response(await (await fetch(map.get(name))).blob());
                    return ogFetch(url);
                };

// 5. START RUNTIME
                const script = document.createElement('script');
                script.src = 'Runtime.js';
                script.onload = () => {
                    console.log("Runtime Loaded");
                    document.getElementById('loader-ui').style.display = 'none';
                    document.getElementById('MMFCanvas').style.display = 'block';
                    
                    // Force the canvas to be visible
                    const cvs = document.getElementById('MMFCanvas');
                    cvs.style.display = "block";
                    cvs.style.backgroundColor = "black";

                    // The second part here must match your file name exactly
                    new Runtime("MMFCanvas", "resources/fnaf 3.cch"); 
                };
                script.onerror = () => {
                    document.getElementById('stage').innerHTML = "ERROR: COULD NOT LOAD RUNTIME.JS";
                };
                document.head.appendChild(script);

            } catch (err) {
                document.getElementById('stage').innerHTML = `<span style="color:red">ERROR: ${err.message}</span>`;
            }
        }

        window.onload = start;
    </script>
</body>
</html>
