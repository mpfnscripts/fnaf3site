<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Nights at Freddy's 4</title>
    <style>
        html { display: block; background: #000; -webkit-user-select: none; user-select: none; overflow: hidden; height: 100%; }
        body { position: relative; background-color: black; display: flex; align-items: center; justify-content: center; margin: 0; height: 100%; color: white; font-family: monospace; }
        canvas { display: none; image-rendering: pixelated; }
        .loader { position: absolute; display: flex; flex-direction: column; align-items: center; z-index: 5; text-align: center; width: 85vw; }
        #bar-container { width: 100%; border: 1px solid #333; height: 4px; margin: 10px 0; }
        #bar { background: white; width: 0%; height: 100%; transition: width 0.1s; }
        #play-zone { display: none; z-index: 10; text-align: center; }
        #play-button { background: #111; border: 2px solid white; color: white; padding: 20px 50px; font-size: 24px; cursor: pointer; }
        #play-button:hover { background: white; color: black; }
    </style>
</head>
<body>
    <canvas id="MMFCanvas" width="1024" height="768"></canvas>
    
    <div class="loader" id="loader-ui">
        <h1 id="percentage">0%</h1>
        <div id="bar-container"><div id="bar"></div></div>
        <h2 id="stage" style="font-size: 12px; color: #666;">INITIALIZING...</h2>
    </div>

    <div id="play-zone">
        <button id="play-button">START GAME</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        window.blobMap = new Map();
        window.urlMap = new Map();

        function updateProgress(text, percent) {
            document.getElementById('percentage').innerText = percent + '%';
            document.getElementById('bar').style.width = percent + '%';
            document.getElementById('stage').innerText = text.toUpperCase();
        }

        async function start() {
            try {
                let chunks = [];
                for (let i = 1; i <= 20; i++) {
                    updateProgress(`FETCHING DATA ${i}`, Math.floor((i / 20) * 40));
                    const res = await fetch(`resources.zip.part${i}`);
                    if (!res.ok) throw new Error("Part " + i + " failed.");
                    chunks.push(await res.arrayBuffer());
                }

                updateProgress("DECOMPRESSING", 50);
                const zip = await JSZip.loadAsync(new Blob(chunks));
                const files = Object.keys(zip.files);
                
                for (let i = 0; i < files.length; i++) {
                    const file = zip.files[files[i]];
                    if (file.dir) continue;

                    const name = files[i].split('/').pop();
                    const data = await file.async("uint8array");
                    
                    const type = name.endsWith('.png') ? 'image/png' : 'application/octet-stream';
                    const blob = new Blob([data], { type: type });
                    
                    window.blobMap.set(name, blob);
                    window.urlMap.set(name, URL.createObjectURL(blob));
                }

                document.getElementById('loader-ui').style.display = 'none';
                document.getElementById('play-zone').style.display = 'block';

            } catch (err) {
                console.error(err);
                document.getElementById('stage').innerText = "FATAL ERROR: " + err.message;
            }
        }

        // --- IMPROVED INTERCEPTORS ---
        const originalFetch = window.fetch;
        window.fetch = async (input, init) => {
            const url = typeof input === 'string' ? input : input.url;
            const name = url.split('/').pop();
            
            if (window.blobMap.has(name)) {
                return new Response(window.blobMap.get(name), {
                    status: 200,
                    statusText: 'OK',
                    headers: { 'Content-Type': name.endsWith('.png') ? 'image/png' : 'application/octet-stream' }
                });
            }
            return originalFetch(input, init);
        };

        const originalOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
            const name = url.toString().split('/').pop();
            if (window.urlMap.has(name)) {
                url = window.urlMap.get(name);
            }
            return originalOpen.apply(this, [method, url]);
        };

        const OriginalImage = window.Image;
        window.Image = function() {
            const img = new OriginalImage();
            const setter = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src').set;
            Object.defineProperty(img, 'src', {
                set: function(val) {
                    const name = val.toString().split('/').pop();
                    if (window.urlMap.has(name)) {
                        setter.call(this, window.urlMap.get(name));
                    } else {
                        setter.call(this, val);
                    }
                }
            });
            return img;
        };

        document.getElementById('play-button').onclick = function() {
            document.getElementById('play-zone').style.display = 'none';
            document.getElementById('MMFCanvas').style.display = 'block';

            // Audio Unlock
            const AC = window.AudioContext || window.webkitAudioContext;
            if (AC) { const ctx = new AC(); ctx.resume(); }

            const script = document.createElement('script');
            script.src = 'Runtime.js';
            script.onload = () => {
                // Find the .cch file
                const cchFile = Array.from(window.urlMap.keys()).find(f => f.toLowerCase().endsWith('.cch'));
                
                if (cchFile) {
                    const dataUrl = window.urlMap.get(cchFile);
                    console.log("Launching Game Data:", cchFile);
                    
                    // We pass the BLOB URL directly. 
                    // If it fails with "File Not Found", the engine might not support Blobs for the main CCH.
                    // In that case, we fall back to the filename and let the XHR interceptor handle it.
                    try {
                        new Runtime("MMFCanvas", dataUrl);
                    } catch(e) {
                        new Runtime("MMFCanvas", cchFile);
                    }
                } else {
                    alert("No .cch file found in zip!");
                }
            };
            document.head.appendChild(script);
        };

        window.onload = start;
    </script>
</body>
</html>
