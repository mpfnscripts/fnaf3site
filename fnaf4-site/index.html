<!DOCTYPE html>
<html>
<head>
    <title>FNAF 4 - Web Port</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <div id="selection">
        <div id="loader-ui">
            <img src="launcher-text.png" id="launcher-text" alt="Loading...">
            <div id="progress-container">
                <div id="bar"></div>
            </div>
            <p id="percentage">0%</p>
        </div>
        
        <button id="play-button" style="display:none;">START GAME</button>
    </div>

    <canvas id="MMFCanvas" width="1024" height="768" style="display:none;"></canvas>

    <script>
        const blobMap = new Map();
        const urlMap = new Map();

        // --- 1. THE INTERCEPTOR (Monkey Patch) ---
        // This stops the 404 errors by redirecting image requests to our unzipped Blobs
        const OriginalImage = window.Image;
        window.Image = function() {
            const img = new OriginalImage();
            const setter = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src').set;
            
            Object.defineProperty(img, 'src', {
                set: function(val) {
                    const filename = val.toString().split('/').pop();
                    if (urlMap.has(filename)) {
                        setter.call(this, urlMap.get(filename));
                    } else {
                        setter.call(this, val);
                    }
                }
            });
            return img;
        };

        // Hook Fetch and XHR as backups for data files
        const ogFetch = window.fetch;
        window.fetch = async (input, init) => {
            const url = typeof input === 'string' ? input : input.url;
            const name = url.split('/').pop();
            if (blobMap.has(name)) return new Response(blobMap.get(name));
            return ogFetch(input, init);
        };

        // --- 2. INITIALIZATION (Download & Unzip) ---
        async function init() {
            try {
                let chunks = [];
                // Download the 20 parts
                for (let i = 1; i <= 20; i++) {
                    const res = await ogFetch(`resources.zip.part${i}`);
                    if (!res.ok) throw new Error("Missing part " + i);
                    chunks.push(await res.arrayBuffer());
                    
                    // Update Progress (0% to 50%)
                    let p = Math.floor((i / 20) * 50);
                    document.getElementById('percentage').innerText = p + '%';
                    document.getElementById('bar').style.width = p + '%';
                }

                // Combine and Load Zip
                const zip = await JSZip.loadAsync(new Blob(chunks));
                const files = Object.keys(zip.files);
                
                // Extract every file into memory
                let processed = 0;
                for (let filename of files) {
                    const file = zip.files[filename];
                    if (file.dir) continue;

                    const shortName = filename.split('/').pop();
                    const data = await file.async("uint8array");
                    
                    const type = shortName.endsWith('.png') ? 'image/png' : 'application/octet-stream';
                    const blob = new Blob([data], { type: type });
                    
                    blobMap.set(shortName, blob);
                    urlMap.set(shortName, URL.createObjectURL(blob));

                    processed++;
                    // Update Progress (50% to 100%)
                    let p = 50 + Math.floor((processed / files.length) * 50);
                    document.getElementById('percentage').innerText = p + '%';
                    document.getElementById('bar').style.width = p + '%';
                }

                document.getElementById('loader-ui').style.display = 'none';
                document.getElementById('play-button').style.display = 'block';

            } catch (e) {
                console.error(e);
                document.getElementById('percentage').innerText = "Load Error: " + e.message;
            }
        }

        // --- 3. START GAME ---
document.getElementById('play-button').onclick = () => {
    // 1. Force Resume Audio Context
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) {
        const audioCtx = new AC();
        audioCtx.resume();
    }
    
    // 2. Heavy-Duty UI Cleanup
    // Hide the selection container and clear any background images set via CSS
    const selection = document.getElementById('selection');
    if (selection) selection.style.display = 'none';
    
    document.body.style.background = "black";
    document.body.style.backgroundImage = "none";

    // 3. Prepare Canvas
    const canvas = document.getElementById('MMFCanvas');
    canvas.style.display = 'block';
    canvas.focus();

    // 4. Load Engine
    const script = document.createElement('script');
    script.src = "Runtime.js";
    script.onload = () => {
        // Find the .cch file
        const cchFileName = Array.from(urlMap.keys()).find(k => k.toLowerCase().endsWith('.cch'));
        
        if (cchFileName) {
            // CRITICAL: We must pass the BLOBS URL, not just the string name
            const gameDataUrl = urlMap.get(cchFileName);
            console.log("Starting game with data:", cchFileName);
            
            // Initialize the engine
            window.fnafRuntime = new Runtime("MMFCanvas", gameDataUrl);
        } else {
            alert("Error: .cch game file (the actual game data) not found in your zip!");
        }
    };
    document.head.appendChild(script);
};

        window.onload = init;
    </script>
</body>
</html>
