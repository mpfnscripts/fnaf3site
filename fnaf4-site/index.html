<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Nights at Freddy's 4</title>
    <link rel="icon" href="data:image/x-icon;base64,AAABAAEAAQEAAAEAIAAwAAAAFgAAACgAAAABAAAAAgAAAAEAIAAAAAAABAAAAAAAAAAAAAAAAAAAAAAAAAAAAP//AAAAAA==" />
    <style>
        html { display: block; -webkit-user-select: none; user-select: none; overflow: hidden; height: 100%; }
        body { position: relative; background-color: black; background-image: url(resources/office.png); background-position: center; background-size: cover; display: flex; align-items: center; justify-content: center; margin: 0; height: 100%; overflow: hidden; }
        
        .selection { height: 100vh; width: 100%; display: flex; overflow: hidden; position: relative; z-index: 2; }
        .launcher-text { position: absolute; left: 50%; transform: translate(-50%, 0); bottom: 2.5vh; z-index: 3; cursor: pointer; }
        .vignette { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 4; }
        .glitch { position: absolute; background-image: url(resources/background.gif); background-position: center; background-size: 50vw; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; opacity: 0.15; z-index: 1; }
        
        canvas { display: none; user-select: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; }

        #title { position: absolute; top: 10vh; left: 5vw; z-index: 3; height: 20vh; }
        #animatronic { position: absolute; top: -5vh; right: 7vw; height: 120vh; z-index: 2; }

        .loader { position: absolute; display: flex; flex-direction: column; align-items: center; left: 50%; transform: translate(-50%, 0); bottom: 12vh; z-index: 5; color: white; font-family: monospace; text-align: center; width: 85vw; }
        .loader h1 { margin: 0; font-size: 5vw; text-shadow: 0 0 10px red; }
        #bar { margin: 10px 0; border: white solid 1px; width: 0%; height: 4px; transition: width 0.2s; background: red; }
        #stage { font-size: 1.4vw; color: #aaa; text-transform: uppercase; }

        #play-button { 
            display: none; position: absolute; left: 50%; bottom: 15vh; transform: translateX(-50%);
            background: #111; border: 2px solid red; color: white; padding: 15px 40px; 
            font-size: 2vw; font-family: monospace; cursor: pointer; z-index: 20;
        }
        #play-button:hover { background: red; color: black; }
    </style>
</head>

<body>
    <canvas id="MMFCanvas" width="1024" height="768"></canvas>
    
    <div class="selection" id="selection">
        <img id="title" src="resources/title.png">
        <img id="animatronic" src="resources/animatronic.png">
        
        <div class="loader" id="loader-ui">
            <h1 id="percentage">0%</h1>
            <div id="bar"></div>
            <h2 id="stage">INITIALIZING...</h2>
        </div>

        <button id="play-button">START NIGHTMARE</button>

        <a href="https://discord.gg/xuu8TnSY4b">
            <div class="launcher-text"><img src="resources/launcher-text.png" style="width: 45vw;"></div>
        </a>
    </div>

    <div class="glitch"></div>
    <img src="resources/vignette.png" class="vignette">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        const totalParts = 20; 
        const blobMap = new Map();
        const urlMap = new Map();

        function updateProgress(text, percent) {
            document.getElementById('percentage').innerText = percent + '%';
            document.getElementById('bar').style.width = percent + '%';
            document.getElementById('stage').innerText = text;
        }

        async function init() {
            try {
                let chunks = [];
                for (let i = 1; i <= totalParts; i++) {
                    updateProgress(`FETCHING PART ${i}`, Math.floor((i / totalParts) * 40));
                    // Check if file name matches resources.zip.part or resources.part
                    const res = await fetch(`resources.zip.part${i}`);
                    if (!res.ok) throw new Error("Could not find part " + i);
                    chunks.push(await res.arrayBuffer());
                }

                updateProgress("UNZIPPING NIGHTMARE...", 50);
                const zip = await JSZip.loadAsync(new Blob(chunks));
                const files = Object.keys(zip.files).filter(name => !zip.files[name].dir);

                for (let i = 0; i < files.length; i++) {
                    const file = zip.files[files[i]];
                    const fileName = files[i].split('/').pop();
                    const data = await file.async("uint8array");
                    
                    // Critical for audio: specific mime types
                    let type = "application/octet-stream";
                    if(fileName.endsWith(".png")) type = "image/png";
                    if(fileName.endsWith(".mp3")) type = "audio/mpeg";
                    if(fileName.endsWith(".wav")) type = "audio/wav";

                    const blob = new Blob([data], { type: type });
                    blobMap.set(fileName, blob);
                    urlMap.set(fileName, URL.createObjectURL(blob));
                    updateProgress("MAPPING ASSETS...", 50 + Math.floor((i / files.length) * 45));
                }

                updateProgress("READY", 100);
                document.getElementById('loader-ui').style.display = 'none';
                document.getElementById('play-button').style.display = 'block';

            } catch (err) {
                document.getElementById('stage').innerHTML = `<span style="color:red">ERROR: ${err.message}</span>`;
                console.error(err);
            }
        }

        // --- GLOBAL INTERCEPTORS ---
        const ogFetch = window.fetch;
        window.fetch = async (input, init) => {
            const url = typeof input === 'string' ? input : input.url;
            const name = url.split('/').pop();
            if (blobMap.has(name)) {
                const response = new Response(blobMap.get(name));
                Object.defineProperty(response, 'url', { value: url });
                return response;
            }
            return ogFetch(input, init);
        };

        const ogOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
            const name = url.toString().split('/').pop();
            if (urlMap.has(name)) url = urlMap.get(name);
            return ogOpen.apply(this, arguments);
        };

        const OriginalImage = window.Image;
        window.Image = function() {
            const img = new OriginalImage();
            const setter = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src').set;
            Object.defineProperty(img, 'src', {
                set: function(url) {
                    const name = url.toString().split('/').pop();
                    if (urlMap.has(name)) setter.call(this, urlMap.get(name));
                    else setter.call(this, url);
                }
            });
            return img;
        };

        function unlockAudio() {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return;
            const ctx = new AC();
            ctx.resume();
            if (window.activeAudioContext) window.activeAudioContext.resume();
        }

        document.getElementById('play-button').onclick = () => {
            unlockAudio();
            document.getElementById('selection').style.display = 'none';
            document.getElementById('MMFCanvas').style.display = 'block';

            const script = document.createElement('script');
            script.src = "Runtime.js";
            script.onload = () => {
                window.resourcesPath = ""; 
                // Find the first .cch file available in the zip
                const actualCch = Array.from(urlMap.keys()).find(f => f.toLowerCase().endsWith('.cch')) || "fnaf 4.cch";
                new Runtime("MMFCanvas", actualCch);
                setTimeout(unlockAudio, 1500); 
            };
            document.head.appendChild(script);
        };

        window.onload = init;
    </script>
</body>
</html>
